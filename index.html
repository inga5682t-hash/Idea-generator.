
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор идей для постов</title>
    <style>
        :root {
            --primary-color: #6366f1;
            --bg-color: #f8fafc;
            --text-color: #1e293b;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #f1f5f9;
            margin-bottom: 0.75rem;
            padding: 1rem;
            border-radius: 0.5rem;
            border-left: 4px solid var(--primary-color);
            transition: transform 0.2s;
        }

        li:hover {
            transform: translateX(5px);
            background: #e2e8f0;
        }

        .emoji {
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Генератор идей для постов</h1>
        <ul>
            <li><span class="emoji">💡</span> 5 идей постов для экспертов</li>
            <li><span class="emoji">📸</span> 3 идеи сторис</li>
            <li><span class="emoji">📅</span> Контент-план на неделю</li>
        </ul>
    </div>
</body>
</html>
